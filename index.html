<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Form</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="wrapper">
    <h2>Register</h2>

    <form id="registerForm">
        <div class="input-box">
            <input type="text" id="regName" placeholder="Enter Your Name" required>
        </div>
        <div class="input-box">
            <input type="email" id="regEmail" placeholder="Enter Your Email" required>
        </div>
        <div class="input-box">
            <input type="password" id="regPassword" placeholder="Enter Your Password" required>
        </div>
        <div class="input-box">
            <input type="password" id="regConfirmPassword" placeholder="Confirm Password" required>
        </div>
        <div class="policy">
            <input type="checkbox" id="termsCheckbox">
            <h3>I accept all the Terms and Condition</h3>
        </div>
        <div class="input-box button">
            <input type="submit" value="Register Now">
        </div>
        <div class="text">
            <h3>Already have an Account? <a href="login.html">Login now</a></h3>
        </div>
    </form>

    <div id="message"></div>
</div>

<script>
    // 1. Изменили название переменной на supabaseClient во избежание конфликта
    // 2. Вставьте сюда ваш настоящий anon key, начинающийся на eyJ...
    const supabaseClient = window.supabase.createClient(
        'https://uztashzxcfyzkxlpzdpj.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV6dGFzaHp4Y2Z5emt4bHB6ZHBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0MjE1MDQsImV4cCI6MjA5NTk5NzUwNH0.r2ZzVEmZcXrQ6O5bnm72RF9duK2uSMICfOkfjD16d58'
    );

    function showMessage(text, isError = true) {
        const msgDiv = document.getElementById('message');
        msgDiv.textContent = text;
        msgDiv.style.color = isError ? 'red' : 'green';
        msgDiv.style.marginTop = '15px';
        msgDiv.style.textAlign = 'center';
        setTimeout(() => {
            msgDiv.textContent = '';
        }, 5000);
    }

    const form = document.getElementById('registerForm');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const name = document.getElementById('regName').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;
        const confirmPassword = document.getElementById('regConfirmPassword').value;
        const termsChecked = document.getElementById('termsCheckbox').checked;

        if (!name || !email || !password || !confirmPassword) {
            showMessage('Заполните все поля!');
            return;
        }

        if (password !== confirmPassword) {
            showMessage('Пароли не совпадают!');
            return;
        }

        if (password.length < 6) {
            showMessage('Пароль должен быть не менее 6 символов!');
            return;
        }

        if (!termsChecked) {
            showMessage('Примите условия использования!');
            return;
        }

        // Используем supabaseClient для запроса
        const { data, error } = await supabaseClient.auth.signUp({
            email: email,
            password: password,
            options: {
                data: {
                    username: name,
                    full_name: name
                },
                emailRedirectTo: 'https://mangustox.github.io/-.github.io/main.html'
            }
        });

        if (error) {
            showMessage(error.message);
        } else {
            showMessage('Регистрация успешна! Проверьте почту для подтверждения.', false);

            document.getElementById('regName').value = '';
            document.getElementById('regEmail').value = '';
            document.getElementById('regPassword').value = '';
            document.getElementById('regConfirmPassword').value = '';
            document.getElementById('termsCheckbox').checked = false;
        }
    });
</script>



</body>
</html>
