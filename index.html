<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register & Verify</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="wrapper">
    <div id="register-step">
        <h2>Register</h2>
        <form id="registerForm">
            <div class="input-box">
                <input type="text" id="regName" placeholder="Enter Your Name" required>
            </div>
            <div class="input-box">
                <input type="email" id="regEmail" placeholder="Enter Your Email" required>
            </div>
            <div class="input-box">
                <input type="password" id="regPassword" placeholder="Enter Your Password" required>
            </div>
            <div class="input-box">
                <input type="password" id="regConfirmPassword" placeholder="Confirm Password" required>
            </div>
            <div class="policy">
                <input type="checkbox" id="termsCheckbox">
                <h3>I accept all the Terms and Condition</h3>
            </div>
            <div class="input-box button">
                <input type="submit" value="Register Now">
            </div>
            <div class="text">
                <h3>Already have an Account? <a href="login.html">Login now</a></h3>
            </div>
        </form>
    </div>

    <div id="otp-step" style="display: none;">
        <h2>Verify Email</h2>
        <p style="text-align: center; margin-bottom: 20px;">Мы отправили 6-значный код на вашу почту</p>
        <form id="otpForm">
            <div class="input-box">
                <input type="text" id="otpCode" placeholder="Введите 6-значный код" maxlength="6" required>
            </div>
            <div class="input-box button">
                <input type="submit" value="Подтвердить код">
            </div>
        </form>
    </div>

    <div id="message"></div>
</div>

<script>
    // Инициализация (замените второй параметр на ваш реальный anon-key на eyJ...)
    const supabaseClient = window.supabase.createClient(
        'https://uztashzxcfyzkxlpzdpj.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV6dGFzaHp4Y2Z5emt4bHB6ZHBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0MjE1MDQsImV4cCI6MjA5NTk5NzUwNH0.r2ZzVEmZcXrQ6O5bnm72RF9duK2uSMICfOkfjD16d58'
    );

    // Переменная для сохранения email между шагами
    let userEmail = '';

    // Функция показа уведомлений
    function showMessage(text, isError = true) {
        const msgDiv = document.getElementById('message');
        msgDiv.textContent = text;
        msgDiv.style.color = isError ? 'red' : 'green';
        msgDiv.style.marginTop = '15px';
        msgDiv.style.textAlign = 'center';
        setTimeout(() => { msgDiv.textContent = ''; }, 7000);
    }

    const registerForm = document.getElementById('registerForm');
    const otpForm = document.getElementById('otpForm');

    // ЛОГИКА ШАГА 1: ОТПРАВКА ДАННЫХ РЕГИСТРАЦИИ
    registerForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        const name = document.getElementById('regName').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;
        const confirmPassword = document.getElementById('regConfirmPassword').value;
        const termsChecked = document.getElementById('termsCheckbox').checked;

        if (password !== confirmPassword) { showMessage('Пароли не совпадают!'); return; }
        if (password.length < 6) { showMessage('Пароль должен быть не менее 6 символов!'); return; }
        if (!termsChecked) { showMessage('Примите условия использования!'); return; }

        // Сохраняем email, он понадобится на следующем шаге
        userEmail = email;

        // Отправляем запрос на регистрацию в Supabase
        const { data, error } = await supabaseClient.auth.signUp({
            email: email,
            password: password,
            options: {
                data: { username: name }
            }
        });

        if (error) {
            showMessage(error.message);
        } else {
            // Скрываем форму регистрации и показываем форму ввода OTP-кода
            document.getElementById('register-step').style.display = 'none';
            document.getElementById('otp-step').style.display = 'block';
            showMessage('Код отправлен! Проверьте почту.', false);
        }
    });

    // ЛОГИКА ШАГА 2: ПРОВЕРКА 6-ЗНАЧНОГО КОДА
    otpForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const code = document.getElementById('otpCode').value.trim();

        // Отправляем код на проверку в Supabase
        const { data, error } = await supabaseClient.auth.verifyOtp({
            email: userEmail,
            token: code,
            type: 'signup' // Указываем тип проверки — подтверждение регистрации
        });

        if (error) {
            showMessage('Неверный или просроченный код: ' + error.message);
        } else {
            showMessage('Почта успешно подтверждена! Перенаправление...', false);

            // Через 2 секунды перекидываем пользователя на главную страницу сайта
            setTimeout(() => {
                window.location.href = 'main.html';
            }, 2000);
        }
    });
</script>

</body>
</html>
