<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мой Сайт</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div id="auth-block" class="modal">
    <h2>Добро пожаловать! Войдите, чтобы продолжить</h2>
    <button id="google-btn">Войти через Google</button>

    <form id="email-form">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Пароль" required>
        <button type="submit">Войти по Email</button>
    </form>
</div>

<div id="main-content" style="display: none;">
    <h1>Привет, ты внутри сайта!</h1>
</div>

<script>
    // Инициализация Supabase (возьмите ключи в настройках проекта API)
    const supabaseUrl = 'https://uztashzxcfyzkxlpzdpj.supabase.co';
    const supabaseKey = sb_publishable_F5DJdkfHS6tR2E2sq3krvA_9ZWguXL3;
    const supabase = supabase_js.createClient(supabaseUrl, supabaseKey);

    // 1. Проверяем при заходе: вошел ли пользователь?
    async function checkUser() {
        const { data: { user } } = await supabase.auth.getUser();
        if (user) {
            // Если вошел: прячем форму, показываем сайт
            document.getElementById('auth-block').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
        } else {
            // Если не вошел: показываем форму
            document.getElementById('auth-block').style.display = 'block';
        }
    }
    checkUser();

    // 2. Логика для кнопки Google
    document.getElementById('google-btn').addEventListener('click', async () => {
        await supabase.auth.signInWithOAuth({ provider: 'google' });
    });

    // 3. Логика для Email формы
    document.getElementById('email-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) alert(error.message);
        else window.location.reload(); // Перезагружаем страницу, checkUser сработает заново
    });
</script>
</body>
</html>
