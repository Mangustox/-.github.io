<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="background">
    <h2>Вход / Регистрация</h2>
    <input id="email" type="email" placeholder="Email"><br>
    <input id="password" type="password" placeholder="Пароль"><br>
    <button onclick="register()">Регистрация</button>
    <button onclick="login()">Войти</button>
    <p id="message"></p>
</div>

<script>
    const supabase = window.supabase.createClient(
    'https://uztashzxcfyzkxlpzdpj.supabase.co',
    'sb_publishable_F5DJdkfHS6tR2E2sq3krvA_9ZWguXL3'
)

async function register() {
    const email = document.getElementById('email').value
    const password = document.getElementById('password').value
    const { error } = await supabase.auth.signUp({ email, password })
    if (error) document.getElementById('message').innerText = error.message
    else document.getElementById('message').innerText = 'Проверь email!'}

    async function login() {
    const email = document.getElementById('email').value
    const password = document.getElementById('password').value
    const { error } = await supabase.auth.signInWithPassword({ email, password })
    if (error) document.getElementById('message').innerText = error.message
    else window.location.href = 'index.html'
}
</script>

</body>
</html>
